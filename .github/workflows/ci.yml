name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release"
          - name: asan
            cmake_flags: "-DCMAKE_BUILD_TYPE=Debug -DJIEBACPP_FETCH_ABSEIL=ON -DCMAKE_CXX_FLAGS=-fsanitize=address,undefined -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,undefined"
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and deps
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-19 cmake ninja-build libzstd-dev libabsl-dev
          # Python deps for the reproducibility test (optional; test skips if missing).
          python3 -m pip install --user numpy zstandard dartsclone || true

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19
          ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
